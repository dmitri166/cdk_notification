name: Deploy Event-Driven Notification System

on:
  push:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest tests/ -k "not property" -v

  deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CDK dependencies
        run: pip install -r cdk/requirements.txt

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Bootstrap (first time only, safe to re-run)
        run: cdk bootstrap
        env:
          SES_RECIPIENT_EMAIL: ${{ secrets.SES_RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: CDK Deploy
        run: cdk deploy --require-approval never
        env:
          SES_RECIPIENT_EMAIL: ${{ secrets.SES_RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Valid payload → expect 200
        run: |
          PAYLOAD='{"event_id":"smoke-001","type":"deployment","message":"Smoke test","timestamp":"2024-01-01T00:00:00Z"}'
          aws lambda invoke \
            --function-name notification-producer \
            --payload "$(echo "$PAYLOAD" | base64)" \
            --cli-binary-format raw-in-base64-out \
            /tmp/resp.json
          STATUS=$(python3 -c "import json; print(json.load(open('/tmp/resp.json'))['statusCode'])")
          [ "$STATUS" = "200" ] || (echo "Expected 200, got $STATUS"; cat /tmp/resp.json; exit 1)

      - name: Invalid payload → expect 400
        run: |
          PAYLOAD='{"event_id":"smoke-002","type":"deployment"}'
          aws lambda invoke \
            --function-name notification-producer \
            --payload "$(echo "$PAYLOAD" | base64)" \
            --cli-binary-format raw-in-base64-out \
            /tmp/resp.json
          STATUS=$(python3 -c "import json; print(json.load(open('/tmp/resp.json'))['statusCode'])")
          [ "$STATUS" = "400" ] || (echo "Expected 400, got $STATUS"; cat /tmp/resp.json; exit 1)
